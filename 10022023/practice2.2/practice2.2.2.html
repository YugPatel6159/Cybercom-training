<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <label for="mass">Enter weight in kg</label><input type="number" name="weight" id="weight"><br>
    <label for="height">Enter height in meter</label><input type="number" name="height" id="height"><br>
    <input type="button" value="button" onclick="findBmi()"><br>
    <label for="" id="outLabel"></label>
    </form>
    <script>
        let findBmi = ()=> {
            var inpHeight = Math.pow(document.getElementById("height").value,2); 
            var inpWeight = document.getElementById("weight").value; 
            document.getElementById("outLabel").innerHTML="Your Bmi is:" + inpWeight/inpHeight;
        }
    </script>
</body>
</html>
