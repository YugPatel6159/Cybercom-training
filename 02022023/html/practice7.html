<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style7.css">
    <title>Document</title>
</head>
<body>
    <fieldset>
    <table>
        <form action="success.html">

            <legend>Your address</legend>
            <tr>
                <td>
                    <label for="fName">First Name</label>
                </td>
                <td>
                    <input type="text" class="inputBox" name="First name" id="fName"><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="lName">Last Name</label>
                </td>
                <td>
                    <input type="text" name="Last name" id="lName"><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="street">Street</label>
                </td>
                <td>
                    <input type="text" name="Street" id="street"><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="city">City</label>
                </td>
                <td>
                    <input type="text" name="City" id="city"><br>    
                </td>
            </tr>
        </table>
    </fieldset>
    <fieldset>
        <legend>Additional details</legend>
        <table>
            <tr>
                <td>
                    <label for="bio">Biography</label>
                </td>
                <td>
                    <textarea name="Biography" id="bio" cols="20" rows="2"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="img">Image</label>
                </td>
                <td>
                    <input type="file" name="image" id="img">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="age">Age Group</label>
                </td>
                <td>
                    <input type="number" placeholder="0 to 9 years" name="" id="">
                </td>
            </tr>
        </table>
    </fieldset>
    <fieldset>
        <table>
            
            <legend>Interest</legend>
            <tr>
                <td>
                    <label for="hobbies">Hobbies</label>
                </td>
                <td>
                    <select name="hobbies" id="hobbies">
                        <option value="Playing Soccer">Playing Soccer</option>
                        <option value="Dancing">Dancing</option>
                        <option value="Gardening">Gardening </option>
                        <option value="Watching movies">Watching movies</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="car">Favourite car</label>
                </td>
                <td>
                    <select name="car" id="car">
                        <option value="Volvo">Volvo</option>
                        <option value="Audi">Audi</option>
                        <option value="Bmw">Bmw </option>
                        <option value="Mercedes">Mercedes</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="car">Favourite Public transport</label>
                </td>
                <td>
                    <select name="publicTransport" id="publicTransport">
                        <option value="Ground">Ground</option>
                        <option value="Train">Train</option>
                        <option value="Bus">Bus</option>
                        <option value="Water">Water</option>
                    </select>
                </td>
            </tr>  
        </fieldset>
    </table>
    <button onclick="onClick()">Submit</button>
    <input type="reset">
</form>
    <script>
        function onClick(){
            window.location.href="success.html";
        }
    </script>
</body>
</html>
