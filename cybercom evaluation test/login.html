<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/cybercom evaluation test/css/login.css" />
  </head>
  <body>
    <div class="container">
      <h2>LOGIN</h2>
      <span id="errNewsLogin"></span>
      <div class="inputArea">
        <form action="" name="logForm" id="logForm">
          <input
            class="inp"
            type="text"
            name="email"
            id="email"
            placeholder="Email"
          /><br />
          <input
            class="inp"
            type="password"
            name="password"
            id="password"
            placeholder="password"
          /><br />
          <input class="inp btn" type="button" value="LOGIN" onclick="userLogin()" /><br />
          <span class="inp or">OR</span><br />
          <input class="inp btn" type="button" value="REGISTER NOW" onclick="registerNow()" />
        </form>
      </div>
    </div>
    <script src="/cybercom evaluation test/js/login.js"></script>
  </body>
</html>
